name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── Hard gate: code compiles ──────────────────────────────
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25"
      - name: Build
        run: go build ./...

  # ── Hard gate: all tests pass ─────────────────────────────
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25"
      - name: Test
        run: go test -v -race -count=1 ./...

  # ── Hard gate: static analysis ────────────────────────────
  vet:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25"
      - name: Vet
        run: go vet ./...

  # ── Hard gate: lint ───────────────────────────────────────
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25"
      - name: Install golangci-lint
        run: go install github.com/golangci/golangci-lint/cmd/golangci-lint@latest
      - name: Lint
        run: golangci-lint run --timeout=5m ./...

  # ── Hard gate: article quality ────────────────────────────
  article-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25"
      - name: Article quality check
        run: |
          FAILED=0

          # 1. Frontmatter — draft PRs must NOT have published:true
          echo "::group::1. Frontmatter + publish gate"
          for f in $(find articles -name '*.md' -not -name '.gitkeep' -not -path '*/articles-publish/*' 2>/dev/null || true); do
            echo "  $f"
            for field in '^---' 'published:' 'emoji:' 'type:' 'topics:'; do
              if ! grep -q "$field" "$f" 2>/dev/null; then
                echo "    ❌ missing $field"
                FAILED=1
              fi
            done
            if grep -q 'published: true' "$f" 2>/dev/null; then
              echo "    ❌ published:true in draft PR — must be false (only publish commits flip to true)"
              FAILED=1
            fi
          done
          echo "::endgroup::"

          # A: Publish PR gate — articles-publish/ files are allowed published:true
          echo "::group::1b. Publish PRs"
          for f in $(find articles -name '*.md' -path '*/articles-publish/*' 2>/dev/null || true); do
            echo "  [publish] $f"
            if grep -q 'published: true' "$f" 2>/dev/null; then
              echo "    ✅ publish PR with published:true"
            else
              echo "    ⚠️  publish PR without published:true — verify"
            fi
          done
          echo "::endgroup::"

          # 2. No placeholder / generated junk
          echo "::group::2. Anti-patterns"
          PLACEHOLDERS=("[TODO]" "[WIP]" "[TBD]" "TODO:" "Lorem ipsum" "add more here" "coming soon" "work in progress")
          for f in $(find articles -name '*.md' -not -name '.gitkeep' -not -path '*/articles-publish/*' 2>/dev/null || true); do
            for p in "${PLACEHOLDERS[@]}"; do
              if grep -qi "$p" "$f" 2>/dev/null; then
                echo "  ❌ $f: placeholder '$p'"
                FAILED=1
              fi
            done
          done
          echo "::endgroup::"

          # 3. Code blocks >= 3
          echo "::group::3. Code blocks"
          for f in $(find articles -name '*.md' -not -name '.gitkeep' -not -path '*/articles-publish/*' 2>/dev/null || true); do
            FENCE_COUNT=$(grep -c '```' "$f" 2>/dev/null || echo 0)
            FENCE_COUNT=$((FENCE_COUNT / 2))
            if [ "$FENCE_COUNT" -lt 3 ]; then
              echo "  ❌ $f: $FENCE_COUNT blocks (need >= 3)"
              FAILED=1
            else
              echo "  ✅ $f: $FENCE_COUNT code blocks"
            fi
          done
          echo "::endgroup::"

          # 4. Citation coverage — hard fail if < 2 links in article files
          echo "::group::4. Citation coverage"
          ARTICLES_EXIST=0
          for f in $(find articles -name '*.md' -not -name '.gitkeep' -not -path '*/articles-publish/*' 2>/dev/null || true); do
            ARTICLES_EXIST=1
            LINK_COUNT=$(grep -o '\[.*\](http[^)]*' "$f" 2>/dev/null | wc -l || echo 0)
            if [ "$LINK_COUNT" -lt 2 ]; then
              echo "  ❌ $f: $LINK_COUNT links (need >= 2)"
              FAILED=1
            else
              echo "  ✅ $f: $LINK_COUNT citation links"
            fi
          done
          echo "::endgroup::"

          # 5. Source snapshots — hard fail if articles exist but no snapshots
          echo "::group::5. Source snapshots"
          SNAP_COUNT=$(find data/artifacts/research_snapshots -type f 2>/dev/null | wc -l || echo 0)
          echo "  Snapshots: $SNAP_COUNT"
          if [ "$SNAP_COUNT" -gt 0 ] 2>/dev/null; then
            echo "  ✅ Snapshots present"
          elif [ "$ARTICLES_EXIST" -eq 1 ]; then
            echo "  ❌ Articles exist but no source snapshots found"
            FAILED=1
          else
            echo "  ℹ️  No snapshots (expected for new repos with no articles)"
          fi
          echo "::endgroup::"

          if [ "$FAILED" -eq 1 ]; then
            echo "❌ Article quality checks FAILED"
            exit 1
          fi
          echo "✅ Article quality checks PASSED"
          echo "::endgroup::"

# ────────────────────────────────────────────────────────────
# Branch Protection (manual — set in repo Settings → Branches):
#   Require: build, test, vet, lint, article-check
# ────────────────────────────────────────────────────────────
