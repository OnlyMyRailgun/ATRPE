name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── Hard gate: code compiles ──────────────────────────────
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: atrpe
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25"

      - name: Build
        run: go build ./...

  # ── Hard gate: all tests pass ─────────────────────────────
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: atrpe
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25"

      - name: Test
        run: go test -v -race -count=1 ./...

  # ── Hard gate: static analysis ────────────────────────────
  vet:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: atrpe
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25"

      - name: Vet
        run: go vet ./...

  # ── Hard gate: lint ───────────────────────────────────────
  lint:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: atrpe
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25"

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest
          working-directory: atrpe
          args: --timeout=5m

  # ── Hard gate: article quality validation ─────────────────
  article-check:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: atrpe
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25"

      - name: Article quality check
        run: |
          echo "::group::Article Quality Checks"
          echo "✅ Checking all article drafts for quality..."

          # 1. Article file count (must have at least one draft or article)
          ARTICLE_COUNT=$(find articles -name '*.md' -not -name '.gitkeep' 2>/dev/null | wc -l)
          echo "  Articles found: $ARTICLE_COUNT"

          # 2. Required checks
          FAILED=0

          # Check: every article has frontmatter with published field
          echo "::group::Frontmatter completeness"
          for f in $(find articles -name '*.md' -not -name '.gitkeep' 2>/dev/null); do
            echo "  Checking: $f"
            if ! grep -q '^---$' "$f"; then
              echo "  ❌ $f: missing frontmatter delimiter"
              FAILED=1
            fi
            if ! grep -q 'published:' "$f"; then
              echo "  ❌ $f: missing published: field"
              FAILED=1
            fi
            if ! grep -q 'emoji:' "$f"; then
              echo "  ❌ $f: missing emoji: field"
              FAILED=1
            fi
            if ! grep -q 'type:' "$f"; then
              echo "  ❌ $f: missing type: field"
              FAILED=1
            fi
            if ! grep -q 'topics:' "$f"; then
              echo "  ❌ $f: missing topics: field"
              FAILED=1
            fi
          done
          echo "::endgroup::"

          # Check: no placeholder text in articles
          echo "::group::Placeholder detection"
          PLACEHOLDERS=("[TODO]" "[WIP]" "[TBD]" "TODO:" "Lorem ipsum" "add more here")
          for f in $(find articles -name '*.md' -not -name '.gitkeep' 2>/dev/null); do
            for p in "${PLACEHOLDERS[@]}"; do
              if grep -q "$p" "$f"; then
                echo "  ❌ $f: placeholder text detected: '$p'"
                FAILED=1
              fi
            done
          done
          echo "::endgroup::"

          # Check: code block minimum (at least 3)
          echo "::group::Code block count"
          for f in $(find articles -name '*.md' -not -name '.gitkeep' 2>/dev/null); do
            FENCE_COUNT=$(grep -c '```' "$f" 2>/dev/null || echo 0)
            FENCE_COUNT=$((FENCE_COUNT / 2))  # each block = 2 fences
            if [ "$FENCE_COUNT" -lt 3 ]; then
              echo "  ❌ $f: only $FENCE_COUNT code blocks — need at least 3"
              FAILED=1
            else
              echo "  $f: $FENCE_COUNT code blocks ✅"
            fi
          done
          echo "::endgroup::"

          # Check: buildable Go code in articles/ directory
          echo "::group::Go code validation"
          for f in $(find articles -name '*.go' 2>/dev/null); do
            echo "  Found Go file for review: $f"
            go vet "$f" 2>/dev/null || echo "  ⚠️ $f: go vet warning (may lack full module context)"
          done
          echo "::endgroup::"

          if [ "$FAILED" -eq 1 ]; then
            echo ""
            echo "❌ Article quality checks FAILED. Fix issues above before merge."
            exit 1
          fi
          echo ""
          echo "✅ Article quality checks PASSED"
          echo "::endgroup::"

  # ── Pull request metadata check ───────────────────────────
  pr-check:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: PR body check
        run: |
          PR_BODY="${{ github.event.pull_request.body }}"
          if echo "$PR_BODY" | grep -q "Generated with \[ATRPE\]"; then
            echo "✅ ATRPE-generated PR detected"
          else
            echo "ℹ️ Manual PR — no ATRPE footer found (non-blocking)"
          fi

# ────────────────────────────────────────────────────────────
# Branch Protection Setup (manual, done once in repo settings):
#
# Settings → Branches → Add rule → "main"
#   ☑ Require a pull request before merging
#   ☑ Require status checks to pass before merging
#     Search and select these required checks:
#     - build
#     - test
#     - vet
#     - lint
#     - article-check
#   ☑ Require branches to be up to date before merging
#
# After setting this up, ALL FIVE checks must pass before
# any PR (including ATRPE-generated ones) can be merged.
# ────────────────────────────────────────────────────────────
