name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Go
        uses: actions/setup-go@v5
        with: { go-version: "1.25" }
      - name: Build
        run: go build ./...

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Go
        uses: actions/setup-go@v5
        with: { go-version: "1.25" }
      - name: Test
        run: go test -v -race -count=1 ./...

  vet:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Go
        uses: actions/setup-go@v5
        with: { go-version: "1.25" }
      - name: Vet
        run: go vet ./...

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Go
        uses: actions/setup-go@v5
        with: { go-version: "1.25" }
      - name: Install golangci-lint
        run: go install github.com/golangci/golangci-lint/cmd/golangci-lint@latest
      - name: Lint
        run: golangci-lint run --timeout=5m ./...

  article-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }
      - name: Set up Go
        uses: actions/setup-go@v5
        with: { go-version: "1.25" }
      - name: Article quality check
        run: |
          FAILED=0
          EVENT='${{ github.event_name }}'
          BRANCH_REF='${{ github.head_ref }}'
          echo "Event: $EVENT  Branch: $BRANCH_REF"

          # ── Determine which files to check ──
          if [ "$EVENT" = "pull_request" ]; then
            # Only changed article files (never scans the whole repo)
            FILES=$(git diff --name-only origin/main...HEAD -- articles/ 2>/dev/null | grep '\.md$' | grep -v '.gitkeep' || true)
          else
            # push to main — only check changed files
            FILES=$(git diff --name-only HEAD~1 -- articles/ 2>/dev/null | grep '\.md$' | grep -v '.gitkeep' || true)
          fi

          if [ -z "$FILES" ]; then
            echo "  No changed article files — skipping article-check"
            exit 0
          fi

          echo "  Changed files:"
          echo "$FILES" | sed 's/^/    /'

          # ── Determine branch type ──
          IS_PUBLISH_BRANCH=0
          case "$BRANCH_REF" in atrpe-publish/*) IS_PUBLISH_BRANCH=1 ;; esac

          # ── 1. Frontmatter + published gate ──
          echo "::group::1. Frontmatter + published gate"
          for f in $FILES; do
            echo "  $f"
            for field in '^---' 'published:' 'emoji:' 'type:' 'topics:'; do
              if ! grep -q "$field" "$f" 2>/dev/null; then
                echo "    ❌ missing $field"
                FAILED=1
              fi
            done

            # published:true gate — only on PRs (push to main is always post-merge)
            if [ "$EVENT" = "pull_request" ]; then
              if grep -q 'published: true' "$f" 2>/dev/null; then
                if [ "$IS_PUBLISH_BRANCH" -eq 1 ]; then
                  echo "    ✅ published:true on publish branch"
                else
                  echo "    ❌ published:true on draft branch — must be false"
                  FAILED=1
                fi
              fi
            fi
          done
          echo "::endgroup::"

          # ── 2. Anti-patterns ──
          echo "::group::2. Anti-patterns"
          PLACEHOLDERS=("[TODO]" "[WIP]" "[TBD]" "TODO:" "Lorem ipsum" "add more here" "coming soon" "work in progress")
          for f in $FILES; do
            for p in "${PLACEHOLDERS[@]}"; do
              if grep -qi "$p" "$f" 2>/dev/null; then
                echo "  ❌ $f: placeholder '$p'"
                FAILED=1
              fi
            done
          done
          echo "::endgroup::"

          # ── 3. Code blocks >= 3 ──
          echo "::group::3. Code blocks"
          for f in $FILES; do
            C=$(grep -c '```' "$f" 2>/dev/null || echo 0)
            C=$((C / 2))
            if [ "$C" -lt 3 ]; then
              echo "  ❌ $f: $C blocks (need >= 3)"
              FAILED=1
            else
              echo "  ✅ $f: $C code blocks"
            fi
          done
          echo "::endgroup::"

          # ── 4. Citation coverage ──
          echo "::group::4. Citation coverage"
          for f in $FILES; do
            L=$(grep -o '\[.*\](http[^)]*' "$f" 2>/dev/null | wc -l || echo 0)
            if [ "$L" -lt 2 ]; then
              echo "  ❌ $f: $L links (need >= 2)"
              FAILED=1
            else
              echo "  ✅ $f: $L citation links"
            fi
          done
          echo "::endgroup::"

          # ── 5. Source snapshots (informational only — data lives in ObjectStore, not git) ──
          echo "::group::5. Source snapshots (info)"
          S=$(find data/artifacts/research_snapshots -type f 2>/dev/null | wc -l || echo 0)
          M=0
          test -f data/manifests/citation_manifest.json && M=1
          echo "  Snapshots: $S  Manifest: $M"
          if [ "$M" -gt 0 ] || [ "$S" -gt 0 ]; then
            echo "  ✅ Source proof present"
          else
            echo "  ℹ️  No local snapshots (snapshots live in ObjectStore — verified at workflow time)"
          fi
          echo "::endgroup::"

          if [ "$FAILED" -eq 1 ]; then
            echo "❌ Article quality checks FAILED"
            exit 1
          fi
          echo "✅ Article quality checks PASSED"
          echo "::endgroup::"
